# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    # supply-chain hardening: ignore releases for 14 days before opening PRs
    cooldown:
      default-days: 14
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    # supply-chain hardening: ignore releases for 14 days before opening PRs
    cooldown:
      default-days: 14
