# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy
builds:
  - &build
    id: kcc-cache
    binary: kcc-cache
    main: ./cmd/kcc-cache
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
  - <<: *build
    id: kcc-injector
    binary: kcc-injector
    main: ./cmd/kcc-injector
archives:
  - formats: [tar.gz]
    # replicates the previous `replacements` behaviour (removed in goreleaser v2)
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
homebrew_casks:
  - name: kube-credential-cache
    binaries:
      - kcc-cache
      - kcc-injector
    repository:
      owner: IvMisticos
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/IvMisticos/kube-credential-cache
    description: Caching proxy for Kubernetes credential plugins (ExecCredential)
    license: MIT
    # strip macOS quarantine so the unsigned binaries run without a Gatekeeper prompt
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kcc-cache"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kcc-injector"]
          end

scoops:
  - name: kube-credential-cache
    repository:
      owner: IvMisticos
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/IvMisticos/kube-credential-cache
    description: Caching proxy for Kubernetes credential plugins (ExecCredential)
    license: MIT

checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
release:
  # Approval is enforced by the `release` GitHub Actions environment, so the
  # GitHub release itself can publish directly.
  draft: false
  prerelease: auto
