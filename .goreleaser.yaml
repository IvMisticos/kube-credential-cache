# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy
builds:
  - &build
    id: kcc-cache
    binary: kcc-cache
    main: ./cmd/kcc-cache
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
  - <<: *build
    id: kcc-injector
    binary: kcc-injector
    main: ./cmd/kcc-injector
archives:
  - formats: [tar.gz]
    # replicates the previous `replacements` behaviour (removed in goreleaser v2)
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
release:
  draft: true
  prerelease: auto
